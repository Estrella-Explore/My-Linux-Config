# encoding: utf-8
patch:
  'speller/algebra':
    - erase/^xx$/                      # 第一行保留

  switches:
    - name: ascii_mode
      reset: 0
      states: [ 中文, 英文 ]
    - name: full_shape
      reset: 0
      states: [ 半角, 全角 ]
    - name: zh_simp
      reset: 1
      states: [ 汉字, 漢字]
    - name: ascii_punct
      reset: 0
      states: [ 。，, ．， ]

  translator:
    dictionary : luna_pinyin.my_words
